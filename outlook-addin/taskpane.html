<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreightWizard</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; min-height: 100vh; padding: 16px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .logo { width: 36px; height: 36px; background: linear-gradient(135deg, #9E14FB, #1BA1FF); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .header h1 { font-size: 18px; background: linear-gradient(90deg, #9E14FB, #1BA1FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .email-info { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .email-info .label { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 4px; }
    .email-info .value { font-size: 14px; color: #fff; word-break: break-word; }
    .email-info .subject { font-weight: 600; margin-bottom: 12px; }
    .btn { width: 100%; padding: 14px 20px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; margin-top: 8px; }
    .btn-primary { background: linear-gradient(90deg, #9E14FB, #5200FF, #1BA1FF); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(82, 0, 255, 0.3); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .btn-success { background: linear-gradient(90deg, #10B981, #059669); color: white; }
    .btn-sm { padding: 8px 12px; font-size: 12px; width: auto; }
    .analysis-section { margin-top: 20px; }
    .analysis-section h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .analysis-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .analysis-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .analysis-row:last-child { border-bottom: none; }
    .analysis-row .label { font-size: 12px; color: rgba(255,255,255,0.6); }
    .analysis-row .value { font-size: 13px; font-weight: 500; }
    .priority-badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
    .priority-urgent { background: rgba(239,68,68,0.2); color: #EF4444; border: 1px solid rgba(239,68,68,0.3); }
    .priority-high { background: rgba(249,115,22,0.2); color: #F97316; border: 1px solid rgba(249,115,22,0.3); }
    .priority-medium { background: rgba(234,179,8,0.2); color: #EAB308; border: 1px solid rgba(234,179,8,0.3); }
    .priority-low { background: rgba(34,197,94,0.2); color: #22C55E; border: 1px solid rgba(34,197,94,0.3); }
    .summary-text { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.8); }
    .reply-text { width: 100%; min-height: 120px; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-size: 13px; resize: vertical; margin-bottom: 12px; font-family: inherit; }
    .reply-text:focus { outline: none; border-color: #5200FF; }
    .btn-group { display: flex; gap: 8px; }
    .btn-group .btn { flex: 1; }
    .loading { display: flex; flex-direction: column; align-items: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #5200FF; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .notification { position: fixed; top: 16px; left: 16px; right: 16px; padding: 12px 16px; border-radius: 8px; font-size: 13px; z-index: 1000; animation: slideIn 0.3s ease; }
    .notification.success { background: #10B981; color: white; }
    .notification.error { background: #EF4444; color: white; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .hidden { display: none; }
    .quick-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
    .quick-actions .btn { flex: 1; min-width: 45%; }
    .priority-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .priority-indicator.urgent { background: #EF4444; }
    .priority-indicator.high { background: #F97316; }
    .priority-indicator.medium { background: #EAB308; }
    .priority-indicator.low { background: #22C55E; }
    .dashboard-link { margin-top: 20px; padding: 16px; background: rgba(155,135,245,0.1); border: 1px solid rgba(155,135,245,0.3); border-radius: 12px; text-align: center; }
    .dashboard-link p { font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
    .dashboard-link a { color: #9E14FB; text-decoration: none; font-weight: 600; }
    .intent-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; background: rgba(155,135,245,0.2); color: #9E14FB; text-transform: capitalize; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🚀</div>
    <h1>FreightWizard</h1>
  </div>
  
  <div id="notification" class="notification hidden"></div>
  
  <div class="email-info">
    <div class="label">Subject</div>
    <div class="value subject" id="emailSubject">Loading...</div>
    <div class="label" style="margin-top: 8px;">From</div>
    <div class="value" id="emailFrom">Loading...</div>
  </div>
  
  <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeEmail()">
    ✨ Analyze with AI
  </button>
  
  <div id="loadingState" class="loading hidden">
    <div class="spinner"></div>
    <p style="margin-top: 12px; color: rgba(255,255,255,0.6);">Analyzing email...</p>
  </div>
  
  <div id="analysisResults" class="analysis-section hidden">
    <h2>🤖 AI Analysis</h2>
    
    <div class="analysis-card">
      <div class="analysis-row">
        <span class="label">Priority</span>
        <span id="analysisPriority" class="priority-badge">-</span>
      </div>
      <div class="analysis-row">
        <span class="label">Intent</span>
        <span id="analysisIntent" class="intent-badge">-</span>
      </div>
      <div class="analysis-row">
        <span class="label">Transport</span>
        <span id="analysisMode" class="value">-</span>
      </div>
      <div class="analysis-row">
        <span class="label">Route</span>
        <span id="analysisRoute" class="value">-</span>
      </div>
    </div>
    
    <div class="analysis-card">
      <div class="label" style="margin-bottom: 8px;">📋 Summary</div>
      <div id="analysisSummary" class="summary-text">-</div>
    </div>
    
    <h2 style="margin-top: 16px;">💬 Suggested Reply</h2>
    <textarea id="replyText" class="reply-text" placeholder="AI-generated reply will appear here..."></textarea>
    
    <div class="btn-group">
      <button class="btn btn-success" onclick="sendReply()">✉️ Reply</button>
      <button class="btn btn-secondary" onclick="copyReply()">📋 Copy</button>
    </div>
    
    <div class="quick-actions">
      <button class="btn btn-secondary btn-sm" onclick="copyAnalysis()">📊 Copy Analysis</button>
      <button class="btn btn-secondary btn-sm" onclick="openDashboard()">📈 Dashboard</button>
    </div>
  </div>
  
  <div class="dashboard-link">
    <p>Want to analyze all emails at once?</p>
    <a href="http://localhost:3000/dashboard" target="_blank">Open FreightWizard Dashboard →</a>
  </div>

  <script>
    var currentEmail = null;
    var currentAnalysis = null;
    var API_URL = 'https://freightwizard-production.up.railway.app';
    
    Office.onReady(function(info) { 
      if (info.host === Office.HostType.Outlook) loadEmailInfo(); 
    });
    
    function loadEmailInfo() {
      var item = Office.context.mailbox.item;
      document.getElementById('emailSubject').textContent = item.subject || '(No Subject)';
      if (item.from) document.getElementById('emailFrom').textContent = item.from.emailAddress || '';
      currentEmail = { id: item.itemId, subject: item.subject, from: item.from ? item.from.emailAddress : '' };
      item.body.getAsync(Office.CoercionType.Text, function(r) { 
        if (r.status === Office.AsyncResultStatus.Succeeded) currentEmail.body = r.value; 
      });
    }
    
    function analyzeEmail() {
      var btn = document.getElementById('analyzeBtn');
      btn.disabled = true; 
      btn.innerHTML = '⏳ Analyzing...';
      document.getElementById('loadingState').classList.remove('hidden');
      document.getElementById('analysisResults').classList.add('hidden');
      
      fetch(API_URL + '/api/analyze', { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ 
          subject: currentEmail.subject, 
          body: currentEmail.body || '', 
          from: currentEmail.from, 
          emailId: currentEmail.id, 
          source: 'outlook_addon', 
          userEmail: Office.context.mailbox.userProfile.emailAddress 
        }) 
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.analysis) { 
          currentAnalysis = d.analysis;
          displayAnalysis(d.analysis); 
          showNotification('success', 'Analysis complete!'); 
        } else {
          showNotification('error', 'Analysis failed');
        }
        btn.disabled = false; 
        btn.innerHTML = '✨ Analyze with AI';
        document.getElementById('loadingState').classList.add('hidden');
      })
      .catch(function(e) { 
        console.error('Error:', e);
        showNotification('error', 'Connection error'); 
        btn.disabled = false; 
        btn.innerHTML = '✨ Analyze with AI';
        document.getElementById('loadingState').classList.add('hidden');
      });
    }
    
    function displayAnalysis(a) {
      document.getElementById('analysisResults').classList.remove('hidden');
      
      // Priority with color
      var p = (a.priority || 'medium').toLowerCase();
      var priorityEl = document.getElementById('analysisPriority');
      var priorityEmoji = { urgent: '🔴', high: '🟠', medium: '🟡', low: '🟢' };
      priorityEl.innerHTML = '<span class="priority-indicator ' + p + '"></span> ' + p.toUpperCase();
      priorityEl.className = 'priority-badge priority-' + p;
      
      // Intent
      var intent = (a.intent || 'general').replace(/_/g, ' ');
      document.getElementById('analysisIntent').textContent = intent;
      
      // Transport mode
      document.getElementById('analysisMode').textContent = a.mode || '-';
      
      // Route
      var route = '-';
      if (a.pol || a.pod) {
        route = (a.pol || '?') + ' → ' + (a.pod || '?');
      }
      document.getElementById('analysisRoute').textContent = route;
      
      // Summary
      document.getElementById('analysisSummary').textContent = a.summary || '-';
      
      // Reply
      document.getElementById('replyText').value = a.suggested_reply || '';
    }
    
    function sendReply() { 
      var t = document.getElementById('replyText').value; 
      if (t) { 
        Office.context.mailbox.item.displayReplyForm(t); 
        
        // Track reply
        fetch(API_URL + '/api/track-reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            emailId: currentEmail.id,
            replyText: t,
            userEmail: Office.context.mailbox.userProfile.emailAddress,
            source: 'outlook_addon'
          })
        }).catch(function(e) { console.log('Track error:', e); });
        
        showNotification('success', 'Reply opened!'); 
      } else {
        showNotification('error', 'No reply to send');
      }
    }
    
    function copyReply() { 
      var t = document.getElementById('replyText').value; 
      if (t) {
        navigator.clipboard.writeText(t).then(function() { 
          showNotification('success', 'Reply copied!'); 
        });
      } else {
        showNotification('error', 'No reply to copy');
      }
    }
    
    function copyAnalysis() {
      if (!currentAnalysis) {
        showNotification('error', 'No analysis to copy');
        return;
      }
      
      var text = '📧 FreightWizard Analysis\n\n';
      text += '📌 Subject: ' + currentEmail.subject + '\n';
      text += '👤 From: ' + currentEmail.from + '\n\n';
      text += '🎯 Priority: ' + (currentAnalysis.priority || '-').toUpperCase() + '\n';
      text += '📋 Intent: ' + (currentAnalysis.intent || '-') + '\n';
      text += '🚢 Mode: ' + (currentAnalysis.mode || '-') + '\n';
      text += '📍 Route: ' + (currentAnalysis.pol || '?') + ' → ' + (currentAnalysis.pod || '?') + '\n\n';
      text += '📝 Summary:\n' + (currentAnalysis.summary || '-') + '\n';
      
      navigator.clipboard.writeText(text).then(function() {
        showNotification('success', 'Analysis copied!');
      });
    }
    
    function openDashboard() {
      window.open('http://localhost:3000/dashboard', '_blank');
    }
    
    function showNotification(type, msg) { 
      var el = document.getElementById('notification'); 
      el.textContent = msg; 
      el.className = 'notification ' + type;
      el.classList.remove('hidden');
      setTimeout(function() { el.classList.add('hidden'); }, 3000); 
    }
  </script>
</body>
</html>
